customCommands:
  - key: "C"
    context: "files"
    command: 'git diff --staged --quiet 2>/dev/null && { echo "No staged changes" >&2; exit 1; } || { MSG=$(git diff --staged | claude -p "Generate a concise git commit message for these staged changes. Output ONLY the raw commit message with no markdown, no code blocks, no backticks, no explanations. Use conventional commit format." --output-format text 2>&1 | tr -d "\n"); echo "$MSG" | pbcopy; git commit -m "$MSG"; }'
    loadingText: "Generating commit message..."
    description: "Generate commit message"
    outputTitle: "Commit Message"
    background: true
    output: log
gui:
  showCommandLog: false
  showBottomLine: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#6EA3FE"
      - "bold"
    inactiveBorderColor:
      - "#A7B1D9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
