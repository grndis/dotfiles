customCommands:
  - key: "C"
    context: "files"
    prompts:
      - type: "input"
        key: "Msg"
        title: "Commit message:"
        initialValue: '{{ runCommand "sh" "-c" "if git diff --staged --quiet; then echo \"\"; else git diff --staged | claude -p \"Generate concise git commit message. ONLY raw message, no markdown/backticks. Use conventional commit format.\" --output-format text 2>&1; fi" }}'
    command: 'if git diff --staged --quiet; then echo "No staged changes to commit" >&2; exit 1; else git commit -m "{{.Form.Msg}}"; fi'
gui:
  showBottomLine: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#6EA3FE"
      - "bold"
    inactiveBorderColor:
      - "#A7B1D9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
