customCommands:
  - key: "C"
    context: "files"
    loadingText: "Generating commit message..."
    prompts:
      - type: "input"
        key: "Msg"
        title: "Commit message:"
        initialValue: '{{ runCommand "sh -c \"if git diff --staged --quiet 2>/dev/null; then echo \\\"No staged changes\\\"; else git diff --staged | ask \\\"Generate a concise git commit message for these staged changes. Output ONLY the raw commit message with no markdown, no code blocks, no backticks, no explanations. Use conventional commit format.\\\" 2>&1; fi\"" }}'
    command: 'if [ "{{.Form.Msg}}" = "No staged changes" ] || [ -z "{{.Form.Msg}}" ]; then echo "No staged changes to commit" >&2; exit 1; else git commit -m "{{.Form.Msg}}"; fi'
gui:
  showCommandLog: false
  showBottomLine: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#6EA3FE"
      - "bold"
    inactiveBorderColor:
      - "#A7B1D9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
