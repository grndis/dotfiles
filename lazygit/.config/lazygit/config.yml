customCommands:
  - key: "C"
    context: "files"
    output: terminal
    command: |
      if [ "{{.Form.Action}}" = "edit" ]; then
        echo "{{.Form.Msg}}" > .git/COMMIT_EDITMSG && nvim .git/COMMIT_EDITMSG && [ -s .git/COMMIT_EDITMSG ] && git commit -F .git/COMMIT_EDITMSG || echo "Commit message is empty, commit aborted."
      else
        git commit -m "{{.Form.Msg}}"
      fi
    prompts:
      - type: "menuFromCommand"
        title: "AI Commit Messages"
        key: "Msg"
        command: "git diff --staged --quiet && exit 1; git diff --staged | claude -p 'Generate 3 concise git commit messages for these staged changes, each on its own line. Output ONLY the raw commit messages with no markdown, no code blocks, no backticks, no explanations, no numbering. Use conventional commit format.' --output-format text 2>&1 || true"
        filter: "^(?P<raw>.+)$"
        valueFormat: "{{ .raw }}"
        labelFormat: "{{ .raw | green }}"
      - type: "menu"
        title: "Choose Action"
        key: "Action"
        options:
          - name: "Commit directly"
            description: "Use this message as-is"
            value: "direct"
          - name: "Edit before commit"
            description: "Open in editor first"
            value: "edit"

gui:
  showBottomLine: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#6EA3FE"
      - "bold"
    inactiveBorderColor:
      - "#A7B1D9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
