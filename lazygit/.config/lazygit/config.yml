customCommands:
  - key: "C"
    context: "files"
    command: "bash -c \"git diff --staged --quiet && { echo 'Error: No staged changes'; exit 1; }; git diff --staged | claude -p 'Generate concise git commit message. ONLY raw message, no markdown/backticks. Use conventional commit format.' --output-format text > /tmp/lazygit_msg.txt && git commit -F /tmp/lazygit_msg.txt\""

gui:
  showBottomLine: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#6EA3FE"
      - "bold"
    inactiveBorderColor:
      - "#A7B1D9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
