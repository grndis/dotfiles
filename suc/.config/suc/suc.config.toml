# SUC Configuration File (TOML format with environment variable support)
# You can use ${VAR_NAME} syntax to reference environment variables

# Available providers: phind, openai, claude, groq, ollama, openrouter, deepseek, gemini
provider = "openai"

# API key - you can use an environment variable
# Example: api_key = "${SUC_API_KEY}" or api_key = "${OPENAI_API_KEY}"
# api_key = "${COPILOT_TOKEN}"
api_key = "${QWEN_WORKER_API}"

# Model identifier - you can use an environment variable
# Example: model = "${SUC_AI_MODEL}"
model = "coder-model"

# Custom OpenAI-compatible endpoint
# Example: openai_endpoint = "https://api.example.com/v1"
# openai_endpoint = "${COPILOT_API_ENDPOINT}/chat/completions"
openai_endpoint = "${QWEN_WORKER_ENDPOINT}/v1/chat/completions"

# Gemini project ID (required for Gemini provider)
# Example: gemini_project = "${GEMINI_PROJECT}"

[draft.commit_types]
feat = "A new feature"
fix = "A bug fix"
docs = "Documentation only changes"
style = "Changes that do not affect the meaning of the code"
refactor = "A code change that neither fixes a bug nor adds a feature"
perf = "A code change that improves performance"
test = "Adding missing tests or correcting existing tests"
build = "Changes that affect the build system or external dependencies"
ci = "Changes to our CI configuration files and scripts"
chore = "Other changes that don't modify src or test files"
revert = "Reverts a previous commit"

